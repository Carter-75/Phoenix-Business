<section class="py-32 bg-black/40 relative overflow-hidden min-h-screen">
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-gg-secondary/20 rounded-full blur-[120px] pointer-events-none"></div>
  
  <div class="max-w-md mx-auto relative z-10 px-4">
    <div class="glass rounded-3xl p-8 md:p-12 relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gg-secondary to-gg-accent"></div>
      
      <div class="tilt-target text-center mb-10">
        <h2 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tighter">Enterprise Access</h2>
        <p class="text-gg-text/50 font-light">Secure portal for Tier 3 landscape management.</p>
      </div>

      <!-- Success Message UI -->
      <div *ngIf="successMessage" class="max-w-md mx-auto mb-8 p-4 rounded-xl border border-gg-secondary/50 bg-gg-secondary/10 text-gg-secondary text-center font-bold tracking-wide animate-fade-in shadow-[0_0_20px_rgba(16,185,129,0.2)]">
        {{ successMessage }}
      </div>

      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gg-text/70 mb-1">Email</label>
          <input type="email" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gg-secondary transition-colors" placeholder="you@company.com">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="block text-sm font-medium text-gg-text/70">Password</label>
            <button type="button" (click)="mockLogin($event)" class="text-xs text-gg-secondary hover:text-gg-accent transition-colors">Forgot?</button>
          </div>
          <input type="password" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gg-secondary transition-colors" placeholder="••••••••">
        </div>
        <button type="button" (click)="mockLogin($event)" class="w-full bg-white text-black font-black tracking-wide py-4 rounded-2xl hover:bg-gg-secondary hover:text-white transition-all shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_30px_rgba(16,185,129,0.3)]">
          Establish Session
        </button>
      </form>
      
      <div class="mt-8">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-white/10"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-gg-bg text-gg-text/40">Enterprise SSO</span>
          </div>
        </div>
        
        <div class="mt-8 flex gap-4">
          <button type="button" (click)="mockOAuth($event, 'Google')" class="flex-1 flex justify-center items-center gap-3 bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white hover:bg-white/5 transition-all group">
            <svg class="h-5 w-5 group-hover:scale-110 transition-transform" aria-hidden="true" viewBox="0 0 24 24"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z" fill="currentColor"/></svg>
            <span>Google</span>
          </button>
          <button type="button" (click)="mockOAuth($event, 'Microsoft')" class="flex-1 flex justify-center items-center gap-3 bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white hover:bg-white/5 transition-all group">
            <svg class="h-5 w-5 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zm12.6 0H12.6V0H24v11.4z"/></svg>
            <span>Microsoft</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
