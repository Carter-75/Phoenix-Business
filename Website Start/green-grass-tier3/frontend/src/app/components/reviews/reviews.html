<section class="py-32 bg-black/40 relative border-t border-white/5 overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-gg-secondary/10 to-transparent pointer-events-none"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="tilt-target text-center mb-24">
      <h2 class="text-5xl md:text-7xl font-black text-white mb-6 tracking-tighter">Client Stories</h2>
      <p class="text-xl text-gg-text/50 max-w-2xl mx-auto font-light">Real results from our zero-emission ecosystem management.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let review of reviews" #reviewCard class="glass rounded-3xl p-10 border border-white/5 hover:border-gg-accent/50 transition-all duration-500 hover:-translate-y-2 relative group">
        <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent rounded-3xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
        <div class="relative z-10">
          <div class="flex items-center gap-1 mb-8">
            <svg *ngFor="let i of [1,2,3,4,5]" class="w-5 h-5 text-gg-accent" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
          </div>
          <p class="text-gg-text/90 mb-8 text-lg font-light leading-relaxed">"{{ review.text }}"</p>
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-white font-bold">{{ review.author.charAt(0) }}</div>
            <div>
              <h4 class="text-white font-bold">{{ review.author }}</h4>
              <span class="text-sm text-gg-accent">{{ review.role }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
