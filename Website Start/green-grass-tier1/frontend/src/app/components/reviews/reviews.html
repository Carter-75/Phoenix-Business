<section class="py-24 bg-gg-bg relative border-t border-black/5">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-5xl font-bold text-gg-dark mb-4">Client Testimonials</h2>
      <p class="text-gg-dark/60 max-w-2xl mx-auto">See what our community has to say about the zero-emission difference.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
      <div *ngFor="let review of reviews" #reviewCard class="bg-white rounded-2xl p-8 border border-black/5 hover:border-gg-primary/30 transition-colors shadow-sm">
        <div class="flex items-center gap-1 mb-6">
          <svg *ngFor="let i of [1,2,3,4,5]" class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
        </div>
        <p class="text-gg-dark/80 mb-6 italic leading-relaxed">"{{ review.text }}"</p>
        <div>
          <h4 class="text-gg-dark font-bold">{{ review.author }}</h4>
          <span class="text-sm text-gg-dark/50">{{ review.role }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
