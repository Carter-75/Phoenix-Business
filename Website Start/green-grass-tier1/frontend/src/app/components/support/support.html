<section class="py-24 bg-gg-bg border-t border-black/5 relative z-10">
  <div class="max-w-3xl mx-auto px-4">
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-5xl font-bold text-gg-dark mb-4">Contact Support</h2>
      <p class="text-gg-dark/60">Have an issue or a question? Send us a message and our team will assist you.</p>
    </div>

    <!-- Success Message UI -->
    <div *ngIf="successMessage" class="mb-8 p-4 rounded-xl border border-gg-primary/50 bg-gg-primary/10 text-gg-primary text-center font-bold animate-fade-in">
      {{ successMessage }}
    </div>

    <form (submit)="mockSubmit($event)" class="bg-white rounded-2xl p-8 border border-black/5 shadow-sm">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="block text-sm font-medium text-gg-dark/80 mb-2">Full Name</label>
          <input type="text" required class="w-full bg-gg-bg border border-black/10 rounded-xl px-4 py-3 text-gg-dark focus:outline-none focus:border-gg-primary transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-gg-dark/80 mb-2">Email Address</label>
          <input type="email" required class="w-full bg-gg-bg border border-black/10 rounded-xl px-4 py-3 text-gg-dark focus:outline-none focus:border-gg-primary transition-colors">
        </div>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-medium text-gg-dark/80 mb-2">Subject</label>
        <input type="text" required class="w-full bg-gg-bg border border-black/10 rounded-xl px-4 py-3 text-gg-dark focus:outline-none focus:border-gg-primary transition-colors">
      </div>
      <div class="mb-8">
        <label class="block text-sm font-medium text-gg-dark/80 mb-2">Message</label>
        <textarea required rows="4" class="w-full bg-gg-bg border border-black/10 rounded-xl px-4 py-3 text-gg-dark focus:outline-none focus:border-gg-primary transition-colors"></textarea>
      </div>
      <button type="submit" class="w-full bg-gg-primary text-white font-bold py-4 rounded-xl hover:bg-gg-primary/90 transition-colors shadow-lg hover:shadow-gg-primary/30">
        Submit Ticket
      </button>
    </form>
  </div>
</section>
