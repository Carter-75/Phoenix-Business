<section class="py-32 bg-white relative overflow-hidden" id="services">
  <!-- Subtle background pattern -->
  <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#2E7D32 1px, transparent 1px); background-size: 32px 32px;"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="text-center mb-24">
      <h2 class="text-4xl md:text-6xl font-bold text-gg-dark mb-6 tracking-tight">Our Core Philosophy</h2>
      <p class="text-xl md:text-2xl text-gg-dark/70 max-w-3xl mx-auto font-light">We work <span class="font-semibold italic text-gg-primary">with</span> local soil ecology, not against it.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-16">
      <div *ngFor="let service of services" #serviceCard class="group flex flex-col rounded-[2.5rem] overflow-hidden shadow-xl shadow-gg-primary/5 hover:shadow-2xl hover:shadow-gg-primary/20 transition-all duration-500 bg-gg-bg border border-white/50">
        <div class="relative h-72 sm:h-96 overflow-hidden bg-gg-dark/5">
          <div class="absolute inset-0 bg-gradient-to-t from-gg-dark/60 via-transparent to-transparent z-10 opacity-60 group-hover:opacity-40 transition-opacity duration-500"></div>
          <img [src]="service.image" [alt]="service.title" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-1000 ease-out" />
          <div class="absolute top-6 right-6 z-20">
            <span class="px-5 py-2 glass text-gg-dark font-bold text-xs uppercase tracking-widest rounded-full shadow-sm">
              {{ service.tag }}
            </span>
          </div>
        </div>
        
        <div class="p-10 md:p-12 flex-grow flex flex-col bg-white/50 backdrop-blur-sm">
          <h3 class="text-3xl font-bold text-gg-dark mb-5 group-hover:text-gg-primary transition-colors duration-300">{{ service.title }}</h3>
          <p class="text-lg text-gg-dark/70 leading-relaxed flex-grow font-light">{{ service.description }}</p>
          
          <div class="mt-10">
            <a href="#" class="inline-flex items-center text-gg-primary font-semibold text-lg hover:text-gg-secondary transition-colors">
              Learn more 
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ml-2 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
