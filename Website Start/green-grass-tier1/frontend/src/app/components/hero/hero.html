<section class="relative w-full min-h-screen flex flex-col items-center justify-center overflow-hidden bg-gg-bg pt-20 pb-32">
  <div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gg-secondary/10 via-gg-bg to-gg-bg"></div>
  
  <div class="z-10 text-center px-4 max-w-5xl mx-auto flex flex-col items-center">
    <div class="inline-block mb-8 px-5 py-2 rounded-full glass border border-gg-primary/20 text-gg-primary font-semibold text-sm tracking-widest uppercase animate-fade-in shadow-sm">
      100% Zero-Emission & Organic
    </div>
    
    <h1 #heroTitle class="text-5xl sm:text-7xl md:text-8xl font-bold text-gg-dark mb-8 leading-tight">
      The Lawn You <span class="text-gradient">Love</span>,<br/>
      The Planet We <span class="text-gradient">Share</span>.
    </h1>
    
    <p #heroSubtitle class="text-xl md:text-2xl text-gg-dark/80 mb-12 max-w-3xl font-light leading-relaxed">
      Premium, eco-forward lawn care. We build deep, resilient root systems naturally—without the noise, and without the harsh chemicals.
    </p>
    
    <a routerLink="/services" (click)="triggerConfetti()" class="inline-block group relative px-10 py-5 bg-gg-primary text-white rounded-full font-bold text-xl overflow-hidden transition-all duration-300 hover:scale-105 hover:bg-gg-secondary shadow-2xl shadow-gg-primary/40 focus:outline-none focus:ring-4 focus:ring-gg-primary/30">
      <div class="absolute inset-0 w-full h-full bg-white/20 transform -skew-x-12 -translate-x-full group-hover:translate-x-full transition-transform duration-700 ease-out"></div>
      <span class="relative z-10 flex items-center justify-center gap-3">
        Get Your Free Estimate
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 group-hover:translate-x-2 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </span>
    </a>
  </div>
  
  <!-- Decorative Orbs -->
  <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-gg-secondary/20 rounded-full mix-blend-multiply filter blur-3xl opacity-70 floating"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-gg-accent/10 rounded-full mix-blend-multiply filter blur-3xl opacity-70 floating" style="animation-delay: 2s;"></div>
  <div class="absolute top-1/2 right-1/3 w-64 h-64 bg-gg-primary/10 rounded-full mix-blend-multiply filter blur-3xl opacity-50 floating" style="animation-delay: 4s;"></div>
</section>
