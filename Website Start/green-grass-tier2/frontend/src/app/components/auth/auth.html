<section class="min-h-screen flex items-center justify-center bg-[#0F172A] p-8">
  <div class="glass max-w-md w-full rounded-2xl p-10 relative overflow-hidden">
    <div class="absolute -top-20 -right-20 w-40 h-40 bg-gg-primary/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-gg-secondary/20 rounded-full blur-3xl"></div>
    
    <div class="relative z-10">
      <div class="text-center mb-10">
        <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
        <p class="text-gg-text/50">Sign in to your Green Grass portal</p>
      </div>

      <!-- Success Message UI -->
      <div *ngIf="successMessage" class="mb-8 p-4 rounded-xl border border-gg-secondary/50 bg-gg-secondary/10 text-gg-secondary text-center font-bold animate-fade-in shadow-[0_0_15px_rgba(16,185,129,0.2)]">
        {{ successMessage }}
      </div>

      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gg-text/80 mb-2">Email Address</label>
          <input type="email" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gg-primary transition-colors" placeholder="hello@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gg-text/80 mb-2">Password</label>
          <input type="password" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gg-primary transition-colors" placeholder="••••••••">
        </div>
        
        <button type="button" (click)="mockLogin($event)" class="w-full bg-gg-primary text-white font-bold py-4 rounded-xl hover:bg-gg-primary/90 transition-colors shadow-lg hover:shadow-gg-primary/30">
          Sign In
        </button>
      </form>
    </div>
  </div>
</section>
