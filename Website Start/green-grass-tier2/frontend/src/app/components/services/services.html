<section class="py-32 bg-gg-bg border-t border-gg-glass-border">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="mb-24">
      <h2 class="text-4xl md:text-6xl font-bold text-gg-text mb-6">Our Methodology</h2>
      <div class="h-1 w-24 bg-gradient-to-r from-gg-secondary to-gg-accent rounded-full"></div>
    </div>

    <div class="space-y-32">
      <div *ngFor="let service of services; let i = index" #serviceRow class="flex flex-col md:flex-row gap-12 items-center" [class.md:flex-row-reverse]="i % 2 !== 0">
        
        <div class="w-full md:w-1/2">
          <div class="relative rounded-2xl overflow-hidden glass border border-gg-glass-border p-2">
            <div class="rounded-xl overflow-hidden relative h-[400px]">
              <div class="absolute inset-0 bg-gg-primary/20 z-10 mix-blend-overlay hover:opacity-0 transition-opacity duration-500"></div>
              <img [src]="service.image" [alt]="service.title" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='assets/image1.png';" />
            </div>
          </div>
        </div>

        <div class="w-full md:w-1/2 flex flex-col justify-center">
          <span class="text-6xl md:text-8xl font-black text-gg-surface mb-2 tracking-tighter">{{ service.number }}</span>
          <h3 class="text-3xl md:text-4xl font-bold text-gg-text mb-6">{{ service.title }}</h3>
          <p class="text-xl text-gg-text/60 leading-relaxed font-light">{{ service.description }}</p>
        </div>
        
      </div>
    </div>
  </div>
</section>
